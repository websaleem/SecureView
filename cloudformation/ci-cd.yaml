AWSTemplateFormatVersion: '2010-09-09'
Description: CI/CD Pipeline for SecureView Chrome Extension using AWS CodePipeline and CodeConnections

Parameters:
  FullRepositoryId:
    Type: String
    Description: GitHub Repository ID (e.g., your-org/SecureView)
  BranchName:
    Type: String
    Default: main
    Description: The branch to build and deploy
  CodeConnectionArn:
    Type: String
    Description: ARN of the AWS CodeConnection (created in AWS Console)
  NotificationEmail:
    Type: String
    Description: Email address for build notifications
  Channel:
    Type: String
    Default: beta
    AllowedValues:
      - beta
      - production
    Description: The release channel (beta or production)
    
Resources:
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: 
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/secureview/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource: 
                  - !GetAtt ArtifactsBucket.Arn
                  - !Sub "${ArtifactsBucket.Arn}/*"

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource: 
                  - !GetAtt ArtifactsBucket.Arn
                  - !Sub "${ArtifactsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: '*'
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref CodeConnectionArn

  SecureViewPublishProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "SecureView-Publish-${Channel}"
      Description: Builds and Deploys the SecureView Chrome Extension
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: NODE_VERSION
            Value: '20'
          - Name: CHANNEL
            Value: !Ref Channel
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml

  SecureViewPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "SecureView-Pipeline-${Channel}"
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactsBucket
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              OutputArtifacts:
                - Name: SourceArtifact
              Configuration:
                ConnectionArn: !Ref CodeConnectionArn
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
        - Name: Deploy
          Actions:
            - Name: DeployAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceArtifact
              Configuration:
                ProjectName: !Ref SecureViewPublishProject

  BuildNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "SecureViewPipelineNotifications-${Channel}"

  BuildNotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref BuildNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  PipelineEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "SecureViewPipelineStatusRule-${Channel}"
      Description: Notify on CodePipeline state changes for SecureView
      EventPattern:
        source:
          - aws.codepipeline
        detail-type:
          - CodePipeline Pipeline Execution State Change
        detail:
          pipeline:
            - !Ref SecureViewPipeline
          state:
            - SUCCEEDED
            - FAILED
      Targets:
        - Arn: !Ref BuildNotificationTopic
          Id: TargetFunctionV1

  EventRuleTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref BuildNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref BuildNotificationTopic

Outputs:
  PipelineUrl:
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${SecureViewPipeline}/view"
